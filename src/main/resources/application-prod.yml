spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  mongodb:
    uri: ${MONGO_URI}

jwt:
  secret: ${JWT_SECRET}

mqtt:
  url: ${MQTT_URL}
  client-id: ${MQTT_CLIENT_ID}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}
  topic-in: ${MQTT_TOPIC_IN}

ai:
  base-url: ${AI_BASE_URL}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}