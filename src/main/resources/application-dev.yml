spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/invernadero}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  mongodb:
    uri: ${MONGO_URI}

jwt:
  secret: ${JWT_SECRET}

mqtt:
  url: ${MQTT_URL}
  client-id: ${MQTT_CLIENT_ID}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}
  topic-in: ${MQTT_TOPIC_IN:invernadero/#}

ai:
  base-url: ${AI_BASE_URL}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}